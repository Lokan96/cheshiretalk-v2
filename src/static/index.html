<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheshireTalk v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .screen { min-height: 100vh; }
        .hidden { display: none !important; }
        .message { padding: 8px 12px; margin: 4px 0; border-radius: 8px; max-width: 70%; }
        .message.self { background: #238636; margin-left: auto; }
        .message.peer { background: #21262d; }
        .system-message { text-align: center; color: #8b949e; font-size: 0.85em; margin: 8px 0; }
        .fingerprint-box { font-family: 'JetBrains Mono', monospace; background: #161b22; padding: 16px; border-radius: 8px; border: 1px solid #30363d; }
        .btn-primary { background: #58a6ff; color: #0d1117; padding: 8px 16px; border-radius: 6px; font-weight: 600; }
        .btn-danger { background: #f85149; color: #fff; padding: 8px 16px; border-radius: 6px; }
        .btn-success { background: #238636; color: #fff; padding: 8px 16px; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="screen-home" class="screen flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-bold mb-2 text-[#58a6ff]">CheshireTalk v2</h1>
        <p class="text-[#8b949e] mb-8">Mensageria segura com E2EE</p>
        <div class="w-full max-w-md space-y-4">
            <div>
                <label class="block text-sm mb-1">Máximo de participantes (2-10)</label>
                <input type="number" id="max-participants" value="2" min="2" max="10" class="w-full bg-[#21262d] border border-[#30363d] rounded px-3 py-2 text-white">
            </div>
            <div>
                <label class="block text-sm mb-1">Timer (segundos)</label>
                <input type="number" id="ttl-seconds" value="600" min="30" class="w-full bg-[#21262d] border border-[#30363d] rounded px-3 py-2 text-white">
            </div>
            <button id="btn-create-room" class="btn-primary w-full">Criar Sala</button>
            <button id="btn-join-room" class="w-full border border-[#30363d] rounded px-3 py-2 hover:bg-[#21262d]">Entrar em Sala</button>
        </div>
    </div>

    <div id="screen-join" class="screen hidden flex flex-col items-center justify-center p-8">
        <h2 class="text-2xl font-bold mb-6">Entrar em Sala</h2>
        <div class="w-full max-w-md space-y-4">
            <input type="text" id="join-room-code" placeholder="Código da sala" class="w-full bg-[#21262d] border border-[#30363d] rounded px-3 py-2 text-white uppercase">
            <textarea id="join-pubkey" placeholder="Chave pública do criador (Base64)" rows="3" class="w-full bg-[#21262d] border border-[#30363d] rounded px-3 py-2 text-white text-sm font-mono"></textarea>
            <button id="btn-confirm-join" class="btn-primary w-full">Conectar</button>
            <button onclick="App.showScreen('home')" class="w-full text-[#8b949e] hover:text-white">← Voltar</button>
        </div>
    </div>

    <div id="screen-room" class="screen hidden flex flex-col">
        <div class="bg-[#161b22] border-b border-[#30363d] p-4 flex justify-between items-center">
            <div><span class="text-sm text-[#8b949e]">Sala:</span><span id="room-code" class="font-mono font-bold text-[#58a6ff] ml-2">---</span></div>
            <div class="text-sm text-[#8b949e]"><span id="peer-count">0</span> peers</div>
        </div>
        <div class="bg-[#161b22] p-4 border-b border-[#30363d]">
            <div class="flex gap-4">
                <div class="flex-shrink-0"><div id="qr-code"></div></div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs text-[#8b949e] mb-1">Sua chave pública:</p>
                    <p id="my-public-key" class="text-xs font-mono break-all text-[#58a6ff]">---</p>
                </div>
            </div>
        </div>
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
        <div id="typing-indicator" class="hidden px-4 text-xs text-[#8b949e] italic"></div>
        <div class="bg-[#161b22] border-t border-[#30363d] p-4 flex gap-2">
            <input type="text" id="msg-input" placeholder="Mensagem segura..." class="flex-1 bg-[#0d1117] border border-[#30363d] rounded px-3 py-2 text-white">
            <button id="btn-send" class="btn-primary">Enviar</button>
        </div>
    </div>

    <div id="fingerprint-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-[#161b22] border border-[#f85149] rounded-lg p-6 max-w-md w-full">
            <h3 class="text-xl font-bold text-[#f85149] mb-2">⚠️ Verificação de Segurança</h3>
            <p class="text-sm text-[#8b949e] mb-4">Verifique o fingerprint do peer por canal fora de banda (voz, presencial) antes de confirmar. Isso previne ataques Man-in-the-Middle.</p>
            <div class="mb-4"><span class="text-xs text-[#8b949e]">Peer ID:</span><span id="fingerprint-peer-id" class="font-mono text-sm ml-2">---</span></div>
            <div class="fingerprint-box mb-4 text-center text-lg tracking-wider"><pre id="fingerprint-value" class="text-[#3fb950]">---</pre></div>
            <div class="flex gap-3">
                <button id="btn-verify-fingerprint" class="btn-success flex-1">✅ Verificado</button>
                <button id="btn-dismiss-fingerprint" class="btn-danger flex-1">Ignorar</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
